version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: reviewpilot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5433:5432'
    volumes:
      - reviewpilot_pgdata:/var/lib/postgresql/data

volumes:
  reviewpilot_pgdata:
